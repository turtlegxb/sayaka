<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sayaka Website{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}A beautiful modern Markdown renderer{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Standard Pygments CSS (optional if customized in style.css) -->
</head>
<body>
    <div class="glow-bg"></div>
    <div class="container">
        <header class="site-header">
            <a href="/" class="logo">Sayaka</a>
            <nav>
                <a href="/">Home</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>&copy; 2026 Sayaka Markdown Server</p>
        </footer>
    </div>
</body>
</html>
