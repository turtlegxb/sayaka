{% extends "base.html" %}

{% block title %}{{ title }} - Sayaka{% endblock %}
{% block meta_description %}{{ description }}{% endblock %}

{% block content %}
<article class="post-article">
    <header class="post-header">
        <h1>{{ title }}</h1>
        <div class="post-meta">
            {% if date %}
                <span class="date">{{ date }}</span>
            {% endif %}
        </div>
        {% if description %}
            <p class="post-subtitle">{{ description }}</p>
        {% endif %}
    </header>
    
    <div class="markdown-content">
        {{ content|safe }}
    </div>
</article>
{% endblock %}
